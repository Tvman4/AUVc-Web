<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUVc PC/Web Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }
        input {
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Join Among Us Voice Chat</h2>
        <input type="text" id="username" placeholder="In-Game Name" required>
        <input type="text" id="roomCode" placeholder="Room Code" required>
        <button id="joinBtn">Connect to Room</button>
        <p id="errorMsg" class="error"></p>
        <p>Status: <span id="status" style="color: #ff3b30;">Disconnected</span></p>
    </div>

    <!-- Socket.io client library via CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
